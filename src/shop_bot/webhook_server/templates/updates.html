{% extends 'base.html' %}

{% block title %}Обновления{% endblock %}

{% block content %}
<section class="content-header">
    <h1>Центр обновлений</h1>
    <p>Управление версией бота</p>
</section>

<div class="update-card">
    <div class="update-container">
        <div class="current-version">
            <h3>Текущая версия</h3>
            <span class="badge badge-primary">{{ current_version }}</span>
        </div>

        <div class="update-actions">
            <button id="checkUpdatesBtn" class="button button-primary">
                Проверить обновления
            </button>
        </div>

        <div id="updateStatusArea" class="update-status hidden">
            <!-- Dynamic Content -->
        </div>
        
        <div id="updateLog" class="terminal-log hidden">
            <!-- Logs -->
        </div>
    </div>
</div>

<script>
document.getElementById('checkUpdatesBtn').addEventListener('click', async () => {
    const btn = document.getElementById('checkUpdatesBtn');
    const statusArea = document.getElementById('updateStatusArea');
    const logArea = document.getElementById('updateLog');
    
    btn.disabled = true;
    btn.textContent = 'Проверка...';
    statusArea.classList.add('hidden');
    
    try {
        const response = await fetch("{{ url_for('check_updates_route') }}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token() }}'
            }
        });
        const json = await response.json();
        
        statusArea.classList.remove('hidden');
        
        if (json.status === 'success') {
            const data = json.data;
            if (data.update_available) {
                statusArea.innerHTML = `
                    <div class="alert alert-info">
                        <h4>🔥 Доступно обновление: ${data.latest_version}</h4>
                        <p>${data.release_notes || 'Нет описания релиза.'}</p>
                        <button id="performUpdateBtn" class="button button-success">
                            Обновить сейчас
                        </button>
                    </div>
                `;
                
                document.getElementById('performUpdateBtn').addEventListener('click', performUpdate);
            } else {
                statusArea.innerHTML = `
                    <div class="alert alert-success">
                        У вас установлена последняя версия.
                    </div>
                `;
            }
        } else {
            statusArea.innerHTML = `<div class="alert alert-danger">Ошибка: ${json.message}</div>`;
        }
    } catch (e) {
        statusArea.innerHTML = `<div class="alert alert-danger">Ошибка сети: ${e}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Проверить снова';
    }
});

async function performUpdate() {
    if (!confirm('Вы уверены? Это действие перезапустит бота.')) return;
    
    const statusArea = document.getElementById('updateStatusArea');
    statusArea.innerHTML = '<div class="alert alert-warning">Выполняется обновление... Пожалуйста, подождите. Страница может перезагрузиться.</div>';
    
    try {
        const response = await fetch("{{ url_for('perform_update_route') }}", {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token() }}' }
        });
        const json = await response.json();
        
        if (json.status === 'success') {
            statusArea.innerHTML = '<div class="alert alert-success">Обновление успешно! Бот перезагружается...</div>';
            setTimeout(() => window.location.reload(), 10000);
        } else {
            statusArea.innerHTML = `<div class="alert alert-danger">Ошибка обновления: ${json.message}</div>`;
        }
    } catch (e) {
         statusArea.innerHTML = '<div class="alert alert-warning">Команда отправлена. Возможно, сервер уже перезагружается. Попробуйте обновить страницу через минуту.</div>';
    }
}
</script>
{% endblock %}
